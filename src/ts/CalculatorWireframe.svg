<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="735" height="712.4" viewBox="0,0,735,712.4">
  <g transform="translate(50,50)">
    <g data-paper-data="{&quot;isPaintingLayer&quot;:true}" fill-rule="nonzero" stroke-width="1" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" style="mix-blend-mode: normal">
      <!-- Main container -->
      <g id="main-container">
        <rect x="0" y="0" width="600" height="600" fill="#f8f9fa" stroke="#dee2e6" rx="8"/>
        <rect x="20" y="20" width="560" height="560" fill="#ffffff" stroke="#ced4da" rx="4"/>
      </g>
      
      <!-- History section on the far right -->
      <g id="history-section">
        <rect x="400" y="40" width="180" height="520" fill="#f8f9fa" stroke="#e9ecef" rx="4"/>
        <text x="410" y="70" font-size="16" fill="#2c3e50" font-family="Arial, sans-serif" font-weight="700" text-anchor="start">Operation History</text>
        <line x1="410" y1="85" x2="570" y2="85" stroke="#dee2e6" stroke-width="1"/>
        <text x="410" y="110" font-size="12" fill="#7f8c8d" font-family="monospace" text-anchor="start">5 + 3 = 8</text>
        <text x="410" y="130" font-size="12" fill="#7f8c8d" font-family="monospace" text-anchor="start">12 / 4 = 3</text>
        <text x="410" y="150" font-size="12" fill="#7f8c8d" font-family="monospace" text-anchor="start">7 * 2 = 14</text>
        <text x="410" y="170" font-size="12" fill="#7f8c8d" font-family="monospace" text-anchor="start">9 - 5 = 4</text>
        <text x="410" y="190" font-size="12" fill="#7f8c8d" font-family="monospace" text-anchor="start">(3+4)*2=14</text>
        <text x="410" y="210" font-size="12" fill="#7f8c8d" font-family="monospace" text-anchor="start">8.5 + 1.5=10</text>
      </g>
      
      <!-- Keypad area -->
      <g id="keypad">
        <rect x="40" y="40" width="340" height="400" fill="#ffffff" stroke="#e9ecef" rx="4"/>
        
        <!-- Row 1: Numbers 0-9 -->
        <g id="row-1-numbers">
          <!-- Numbers arranged in a grid -->
          <rect x="60" y="60" width="40" height="40" fill="#e9ecef" stroke="#dee2e6" rx="4"/>
          <text x="80" y="85" font-size="18" fill="#495057" font-family="Arial, sans-serif" text-anchor="middle">1</text>
          
          <rect x="110" y="60" width="40" height="40" fill="#e9ecef" stroke="#dee2e6" rx="4"/>
          <text x="130" y="85" font-size="18" fill="#495057" font-family="Arial, sans-serif" text-anchor="middle">2</text>
          
          <rect x="160" y="60" width="40" height="40" fill="#e9ecef" stroke="#dee2e6" rx="4"/>
          <text x="180" y="85" font-size="18" fill="#495057" font-family="Arial, sans-serif" text-anchor="middle">3</text>
          
          <rect x="210" y="60" width="40" height="40" fill="#e9ecef" stroke="#dee2e6" rx="4"/>
          <text x="230" y="85" font-size="18" fill="#495057" font-family="Arial, sans-serif" text-anchor="middle">4</text>
          
          <rect x="260" y="60" width="40" height="40" fill="#e9ecef" stroke="#dee2e6" rx="4"/>
          <text x="280" y="85" font-size="18" fill="#495057" font-family="Arial, sans-serif" text-anchor="middle">5</text>
          
          <rect x="60" y="110" width="40" height="40" fill="#e9ecef" stroke="#dee2e6" rx="4"/>
          <text x="80" y="135" font-size="18" fill="#495057" font-family="Arial, sans-serif" text-anchor="middle">6</text>
          
          <rect x="110" y="110" width="40" height="40" fill="#e9ecef" stroke="#dee2e6" rx="4"/>
          <text x="130" y="135" font-size="18" fill="#495057" font-family="Arial, sans-serif" text-anchor="middle">7</text>
          
          <rect x="160" y="110" width="40" height="40" fill="#e9ecef" stroke="#dee2e6" rx="4"/>
          <text x="180" y="135" font-size="18" fill="#495057" font-family="Arial, sans-serif" text-anchor="middle">8</text>
          
          <rect x="210" y="110" width="40" height="40" fill="#e9ecef" stroke="#dee2e6" rx="4"/>
          <text x="230" y="135" font-size="18" fill="#495057" font-family="Arial, sans-serif" text-anchor="middle">9</text>
          
          <rect x="260" y="110" width="40" height="40" fill="#e9ecef" stroke="#dee2e6" rx="4"/>
          <text x="280" y="135" font-size="18" fill="#495057" font-family="Arial, sans-serif" text-anchor="middle">0</text>
        </g>
        
        <!-- Row 2: . + - * / ( ) = buttons -->
        <g id="row-2-operators">
          <rect x="60" y="170" width="40" height="40" fill="#e9ecef" stroke="#dee2e6" rx="4"/>
          <text x="80" y="195" font-size="18" fill="#495057" font-family="Arial, sans-serif" text-anchor="middle">.</text>
          
          <rect x="110" y="170" width="40" height="40" fill="#e9ecef" stroke="#dee2e6" rx="4"/>
          <text x="130" y="195" font-size="18" fill="#495057" font-family="Arial, sans-serif" text-anchor="middle">+</text>
          
          <rect x="160" y="170" width="40" height="40" fill="#e9ecef" stroke="#dee2e6" rx="4"/>
          <text x="180" y="195" font-size="18" fill="#495057" font-family="Arial, sans-serif" text-anchor="middle">-</text>
          
          <rect x="210" y="170" width="40" height="40" fill="#e9ecef" stroke="#dee2e6" rx="4"/>
          <text x="230" y="195" font-size="18" fill="#495057" font-family="Arial, sans-serif" text-anchor="middle">*</text>
          
          <rect x="260" y="170" width="40" height="40" fill="#e9ecef" stroke="#dee2e6" rx="4"/>
          <text x="280" y="195" font-size="18" fill="#495057" font-family="Arial, sans-serif" text-anchor="middle">/</text>
          
          <rect x="60" y="220" width="40" height="40" fill="#e9ecef" stroke="#dee2e6" rx="4"/>
          <text x="80" y="245" font-size="18" fill="#495057" font-family="Arial, sans-serif" text-anchor="middle">(</text>
          
          <rect x="110" y="220" width="40" height="40" fill="#e9ecef" stroke="#dee2e6" rx="4"/>
          <text x="130" y="245" font-size="18" fill="#495057" font-family="Arial, sans-serif" text-anchor="middle">)</text>
          
          <rect x="160" y="220" width="80" height="40" fill="#2ecc71" stroke="#27ae60" rx="4"/>
          <text x="200" y="245" font-size="18" fill="#ffffff" font-family="Arial, sans-serif" text-anchor="middle">=</text>
          
          <rect x="250" y="220" width="50" height="40" fill="#e74c3c" stroke="#c0392b" rx="4"/>
          <text x="275" y="245" font-size="16" fill="#ffffff" font-family="Arial, sans-serif" text-anchor="middle">C</text>
        </g>
        
        <!-- Row 3: Memory buttons -->
        <g id="row-3-memory">
          <rect x="60" y="280" width="70" height="40" fill="#3498db" stroke="#2980b9" rx="4"/>
          <text x="95" y="305" font-size="14" fill="#ffffff" font-family="Arial, sans-serif" text-anchor="middle">MR</text>
          
          <rect x="140" y="280" width="70" height="40" fill="#3498db" stroke="#2980b9" rx="4"/>
          <text x="175" y="305" font-size="14" fill="#ffffff" font-family="Arial, sans-serif" text-anchor="middle">MC</text>
          
          <rect x="220" y="280" width="70" height="40" fill="#3498db" stroke="#2980b9" rx="4"/>
          <text x="255" y="305" font-size="14" fill="#ffffff" font-family="Arial, sans-serif" text-anchor="middle">M+</text>
          
          <rect x="300" y="280" width="70" height="40" fill="#3498db" stroke="#2980b9" rx="4"/>
          <text x="335" y="305" font-size="14" fill="#ffffff" font-family="Arial, sans-serif" text-anchor="middle">MS</text>
        </g>
      </g>
      
      <!-- Display area at the bottom -->
      <g id="display">
        <rect x="40" y="460" width="340" height="80" fill="#2c3e50" stroke="#1a252f" rx="4"/>
        <text x="60" y="485" font-size="14" fill="#95a5a6" font-family="Arial, sans-serif" text-anchor="start">Display</text>
        <text x="370" y="515" font-size="32" fill="#ffffff" font-family="monospace" text-anchor="end">0</text>
      </g>
      
      <!-- Status area -->
      <g id="status-area">
        <rect x="40" y="550" width="340" height="30" fill="#ffffff" stroke="#e9ecef" rx="4"/>
        <text x="60" y="570" font-size="14" fill="#495057" font-family="Arial, sans-serif" text-anchor="start">Memory Value: 0</text>
      </g>
      
      <!-- Expression area -->
      <g id="expression-area">
        <text x="40" y="590" font-size="14" fill="#495057" font-family="Arial, sans-serif" text-anchor="start">Expression: (empty)</text>
      </g>
    </g>
  </g>
</svg>
<!--rotationCenter:443.5:306.9-->
