services:
  java-builder:
    build:
      context: /Users/adam/Code/testeranto-example-project
      dockerfile: testeranto/runtimes/java/java.Dockerfile
    container_name: java-builder
    environment:
      ENV: java
      MODE: dev
    working_dir: /workspace
    volumes:
      - /Users/adam/Code/testeranto-example-project/src:/workspace/src
      - /Users/adam/Code/testeranto-example-project/dist:/workspace/dist
      - /Users/adam/Code/testeranto-example-project/testeranto:/workspace/testeranto
    command: |-
      sh -c "cd /workspace && echo '=== Creating proper build.gradle ===' && cat > build.gradle << 'EOF'
      plugins {
          id 'java'
      }

      group 'com.example'
      version '1.0-SNAPSHOT'

      repositories {
          mavenCentral()
          mavenLocal()
      }

      dependencies {
          testImplementation 'org.junit.jupiter:junit-jupiter:5.9.2'
          testImplementation 'org.assertj:assertj-core:3.24.2'
          
          // For JSON processing
          implementation 'com.fasterxml.jackson.core:jackson-databind:2.15.2'
          
          // Kafe library is included in source code, not from Maven
          // implementation 'com.testeranto:testeranto.kafe:0.1.21'
          
          // Add JSON library for org.json
          implementation 'org.json:json:20230227'
      }

      test {
          useJUnitPlatform()
      }

      sourceSets {
          main {
              java {
                  srcDirs = ['src/java/main/java']
              }
          }
          test {
              java {
                  srcDirs = ['src/java/test/java']
              }
          }
      }

      compileJava {
          options.compilerArgs += ['-Xlint:unchecked']
      }
      EOF
      && ls -la build.gradle && echo '=== Contents of build.gradle (first 20 lines) ===' && head -30 build.gradle && echo '=== Running gradle tasks to see available tasks ===' && export GRADLE_OPTS='--add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.lang.invoke=ALL-UNNAMED --add-opens java.base/java.util=ALL-UNNAMED' && (if [ -f ./gradlew ]; then ./gradlew --no-daemon tasks --all; else gradle --no-daemon tasks --all; fi) && echo '=== Building with Gradle ===' && (if [ -f ./gradlew ]; then ./gradlew --no-daemon --stacktrace --refresh-dependencies -Dorg.gradle.jvmargs='--add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.lang.invoke=ALL-UNNAMED --add-opens java.base/java.util=ALL-UNNAMED' build; else gradle --no-daemon --stacktrace --refresh-dependencies -Dorg.gradle.jvmargs='--add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.lang.invoke=ALL-UNNAMED --add-opens java.base/java.util=ALL-UNNAMED' build; fi) && javac -cp \".:lib/*\" testeranto/java_runtime.java && java -cp \"testeranto:.:lib/*\" java_runtime /workspace/testeranto/testeranto.ts /workspace/testeranto/runtimes/java/java.java javatests src/java/test/java/com/example/calculator/CalculatorTest.java src/java/test/java/com/example/calculator/CalculatorJUnitTest.java"
    networks:
      - allTests_network
    image: testeranto-java-javatests:latest
  javatests-src_java_test_java_com_example_calculator_calculatortest-java-bdd:
    build:
