services:
  node-builder:
    build:
      context: /Users/adam/Code/testeranto-example-project
      dockerfile: testeranto/runtimes/node/node.Dockerfile
    container_name: node-builder
    environment: {}
    working_dir: /workspace
    volumes:
      - /Users/adam/Code/testeranto-example-project/src:/workspace/src
      - /Users/adam/Code/testeranto-example-project/example:/workspace/example
      - /Users/adam/Code/testeranto-example-project/dist:/workspace/dist
      - /Users/adam/Code/testeranto-example-project/testeranto:/workspace/testeranto
    command: yarn tsx node_modules/testeranto/src/server/runtimes/node/node.ts /workspace/testeranto/testeranto.ts /workspace/testeranto/runtimes/node/node.mjs nodetests
    networks:
      - allTests_network
  nodetests-src_ts_calculator-test-ts-bdd:
    build:
      context: /Users/adam/Code/testeranto-example-project
      dockerfile: testeranto/runtimes/node/node.Dockerfile
    container_name: nodetests-src_ts_calculator-test-ts-bdd
    environment: {}
    working_dir: /workspace
    volumes:
      - /Users/adam/Code/testeranto-example-project/src:/workspace/src
      - /Users/adam/Code/testeranto-example-project/example:/workspace/example
      - /Users/adam/Code/testeranto-example-project/dist:/workspace/dist
      - /Users/adam/Code/testeranto-example-project/testeranto:/workspace/testeranto
    command: yarn tsx testeranto/bundles/allTests/node/src/ts/Calculator.test.mjs /workspace/testeranto/runtimes/node/node.mjs
    networks:
      - allTests_network
  nodetests-src_ts_calculator-test-ts-aider:
    build:
      context: /Users/adam/Code/testeranto-example-project
      dockerfile: aider.Dockerfile
    container_name: nodetests-src_ts_calculator-test-ts-aider
    environment: {}
    volumes:
      - /Users/adam/Code/testeranto-example-project/.aider.conf.yml:/workspace/.aider.conf.yml
    working_dir: /workspace
    command: aider
    networks:
      - allTests_network
  nodetests-src_ts_calculator-test-ts-check-0:
    build:
      context: /Users/adam/Code/testeranto-example-project
      dockerfile: testeranto/runtimes/node/node.Dockerfile
    container_name: nodetests-src_ts_calculator-test-ts-check-0
    environment: {}
    working_dir: /workspace
    command: yarn eslint
    networks:
      - allTests_network
  nodetests-src_ts_calculator-test-ts-check-1:
    build:
      context: /Users/adam/Code/testeranto-example-project
      dockerfile: testeranto/runtimes/node/node.Dockerfile
    container_name: nodetests-src_ts_calculator-test-ts-check-1
    environment: {}
    working_dir: /workspace
    command: yarn tsc --noEmit
    networks:
      - allTests_network
volumes:
  node_modules:
    driver: local
networks:
  allTests_network:
    driver: bridge
