services:
  java-builder:
    build:
      context: /Users/adam/Code/testeranto-example-project
      dockerfile: testeranto/runtimes/java/java.Dockerfile
    container_name: java-builder
    environment:
      ENV: java
      MODE: dev
    working_dir: /workspace
    volumes:
      - /Users/adam/Code/testeranto-example-project/src:/workspace/src
      - /Users/adam/Code/testeranto-example-project/dist:/workspace/dist
      - /Users/adam/Code/testeranto-example-project/testeranto:/workspace/testeranto
    command: |-
      sh -c "cd /workspace && echo '=== Creating proper build.gradle ===' && cat > build.gradle << 'EOF'
      plugins {
          id 'java'
      }

      group 'com.example'
      version '1.0-SNAPSHOT'

      repositories {
          mavenCentral()
          mavenLocal()
      }

      dependencies {
          testImplementation 'org.junit.jupiter:junit-jupiter:5.9.2'
          testImplementation 'org.assertj:assertj-core:3.24.2'
          
          // For JSON processing
          implementation 'com.fasterxml.jackson.core:jackson-databind:2.15.2'
          
          // Kafe library is included in source code, not from Maven
          // implementation 'com.testeranto:testeranto.kafe:0.1.21'
          
          // Add JSON library for org.json
          implementation 'org.json:json:20230227'
      }

      test {
          useJUnitPlatform()
      }

      sourceSets {
          main {
              java {
                  srcDirs = ['src/java/main/java']
              }
          }
          test {
              java {
                  srcDirs = ['src/java/test/java']
              }
          }
      }

      compileJava {
          options.compilerArgs += ['-Xlint:unchecked']
      }
      EOF
      && ls -la build.gradle && echo '=== Contents of build.gradle (first 20 lines) ===' && head -30 build.gradle && echo '=== Running gradle tasks to see available tasks ===' && export GRADLE_OPTS='--add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.lang.invoke=ALL-UNNAMED --add-opens java.base/java.util=ALL-UNNAMED' && (if [ -f ./gradlew ]; then ./gradlew --no-daemon tasks --all; else gradle --no-daemon tasks --all; fi) && echo '=== Building with Gradle ===' && (if [ -f ./gradlew ]; then ./gradlew --no-daemon --stacktrace --refresh-dependencies -Dorg.gradle.jvmargs='--add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.lang.invoke=ALL-UNNAMED --add-opens java.base/java.util=ALL-UNNAMED' build; else gradle --no-daemon --stacktrace --refresh-dependencies -Dorg.gradle.jvmargs='--add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.lang.invoke=ALL-UNNAMED --add-opens java.base/java.util=ALL-UNNAMED' build; fi) && javac -cp \".:lib/*\" testeranto/java_runtime.java && java -cp \"testeranto:.:lib/*\" java_runtime /workspace/testeranto/testeranto.ts /workspace/testeranto/runtimes/java/java.java javatests "
    networks:
      - allTests_network
    image: testeranto-java-javatests:latest
  ruby-builder:
    build:
      context: /Users/adam/Code/testeranto-example-project
      dockerfile: testeranto/runtimes/ruby/ruby.Dockerfile
    container_name: ruby-builder
    environment:
      ENV: ruby
      MODE: dev
    working_dir: /workspace
    volumes:
      - /Users/adam/Code/testeranto-example-project/src:/workspace/src
      - /Users/adam/Code/testeranto-example-project/dist:/workspace/dist
      - /Users/adam/Code/testeranto-example-project/testeranto:/workspace/testeranto
    command: 'ruby /workspace/testeranto/native_detection.rb /workspace/testeranto/testeranto.ts /workspace/testeranto/runtimes/ruby/ruby.rb rubytests '
    networks:
      - allTests_network
    image: testeranto-ruby-rubytests:latest
  node-builder:
    build:
      context: /Users/adam/Code/testeranto-example-project
      dockerfile: testeranto/runtimes/node/node.Dockerfile
    container_name: node-builder
    environment:
      NODE_ENV: production
      ENV: node
      MODE: dev
    working_dir: /workspace
    volumes:
      - /Users/adam/Code/testeranto-example-project/src:/workspace/src
      - /Users/adam/Code/testeranto-example-project/dist:/workspace/dist
      - /Users/adam/Code/testeranto-example-project/testeranto:/workspace/testeranto
    command: 'yarn tsx /workspace/testeranto/node_runtime.ts /workspace/testeranto/testeranto.ts /workspace/testeranto/runtimes/node/node.mjs nodetests '
    networks:
      - allTests_network
    image: testeranto-node-nodetests:latest
  webtests:
    build:
      context: /Users/adam/Code/testeranto-example-project
      dockerfile: testeranto/runtimes/web/web.Dockerfile
    container_name: webtests
    environment:
      NODE_ENV: production
      ENV: web
      MODE: dev
    working_dir: /workspace
    volumes:
      - /Users/adam/Code/testeranto-example-project/src:/workspace/src
      - /Users/adam/Code/testeranto-example-project/dist:/workspace/dist
      - /Users/adam/Code/testeranto-example-project/testeranto:/workspace/testeranto
    command: yarn tsx /workspace/testeranto/web_runtime.ts /workspace/testeranto/testeranto.ts /workspace/testeranto/runtimes/web/web.ts webtests src/ts/Calculator.test.web.ts
    networks:
      - allTests_network
    expose:
      - '8000'
    image: testeranto-web-webtests:latest
  webtests-src_ts_calculator-test-web-ts-bdd:
    build:
      context: /Users/adam/Code/testeranto-example-project
      dockerfile: testeranto/runtimes/web/web.Dockerfile
    container_name: webtests-src_ts_calculator-test-web-ts-bdd
    environment:
      ESBUILD_HOST: webtests
    working_dir: /workspace
    volumes:
      - /Users/adam/Code/testeranto-example-project/src:/workspace/src
      - /Users/adam/Code/testeranto-example-project/dist:/workspace/dist
      - /Users/adam/Code/testeranto-example-project/testeranto:/workspace/testeranto
    command: yarn tsx /workspace/testeranto/web_hoist.ts testeranto/bundles/webtests/src/ts/Calculator.test.web.mjs '{"ports":[1111],"fs":"testeranto/reports/webtests/src/ts/Calculator.test.web.ts/"}'
    networks:
      - allTests_network
  webtests-src_ts_calculator-test-web-ts-aider:
    image: testeranto-aider:latest
    container_name: webtests-src_ts_calculator-test-web-ts-aider
    environment:
      NODE_ENV: production
    volumes:
      - /Users/adam/Code/testeranto-example-project/.aider.conf.yml:/workspace/.aider.conf.yml
      - /Users/adam/Code/testeranto-example-project:/workspace
    working_dir: /workspace
    command: tail -f /dev/null
    networks:
      - allTests_network
    tty: true
    stdin_open: true
  webtests-src_ts_calculator-test-web-ts-check-0:
    build:
      context: /Users/adam/Code/testeranto-example-project
      dockerfile: testeranto/runtimes/web/web.Dockerfile
    container_name: webtests-src_ts_calculator-test-web-ts-check-0
    environment: {}
    working_dir: /workspace
    command: 'yarn eslint  '
    networks:
      - allTests_network
  webtests-src_ts_calculator-test-web-ts-check-1:
    build:
      context: /Users/adam/Code/testeranto-example-project
      dockerfile: testeranto/runtimes/web/web.Dockerfile
    container_name: webtests-src_ts_calculator-test-web-ts-check-1
    environment: {}
    working_dir: /workspace
    command: 'yarn tsc --noEmit '
    networks:
      - allTests_network
  python-builder:
    build:
      context: /Users/adam/Code/testeranto-example-project
      dockerfile: testeranto/runtimes/python/python.Dockerfile
    container_name: python-builder
    environment:
      ENV: python
      MODE: dev
    working_dir: /workspace
    volumes:
      - /Users/adam/Code/testeranto-example-project/src:/workspace/src
      - /Users/adam/Code/testeranto-example-project/dist:/workspace/dist
      - /Users/adam/Code/testeranto-example-project/testeranto:/workspace/testeranto
    command: 'cd /workspace && python /workspace/testeranto/python_runtime.py /workspace/testeranto/testeranto.ts /workspace/testeranto/runtimes/python/python.py pythontests '
    networks:
      - allTests_network
    image: testeranto-python-pythontests:latest
  golang-builder:
    build:
      context: /Users/adam/Code/testeranto-example-project
      dockerfile: testeranto/runtimes/golang/golang.Dockerfile
    container_name: golang-builder
    environment:
      ENV: golang
      MODE: dev
    working_dir: /workspace
    volumes:
      - /Users/adam/Code/testeranto-example-project/src:/workspace/src
      - /Users/adam/Code/testeranto-example-project/dist:/workspace/dist
      - /Users/adam/Code/testeranto-example-project/testeranto:/workspace/testeranto
    command: 'go run /workspace/testeranto/golang_runtime.go /workspace/testeranto/testeranto.ts /workspace/testeranto/runtimes/golang/golang.ts golangtests '
    networks:
      - allTests_network
    image: testeranto-golang-golangtests:latest
  rust-builder:
    build:
      context: /Users/adam/Code/testeranto-example-project
      dockerfile: testeranto/runtimes/rust/rust.Dockerfile
    container_name: rust-builder
    environment:
      ENV: rust
      MODE: dev
    working_dir: /workspace
    volumes:
      - /Users/adam/Code/testeranto-example-project/src:/workspace/src
      - /Users/adam/Code/testeranto-example-project/dist:/workspace/dist
      - /Users/adam/Code/testeranto-example-project/testeranto:/workspace/testeranto
      - /Users/adam/Code/testeranto-example-project/../testerantoV2:/workspace/testerantoV2
    command: 'cargo run --manifest-path /workspace/testeranto/rust_builder/Cargo.toml -- /workspace/testeranto/testeranto.ts /workspace/testeranto/runtimes/rust/rust.ts rusttests '
    networks:
      - allTests_network
    image: testeranto-rust-rusttests:latest
  chrome-service:
    image: browserless/chrome:latest
    container_name: chrome-service
    environment:
      CONNECTION_TIMEOUT: '60000'
      MAX_CONCURRENT_SESSIONS: '1'
      ENABLE_CORS: 'true'
      PREBOOT_CHROME: 'true'
      DEFAULT_BLOCK_ADS: 'true'
    shm_size: 2g
    expose:
      - '3000'
    ports:
      - '9222:3000'
    networks:
      - allTests_network
volumes:
  node_modules:
    driver: local
networks:
  allTests_network:
    driver: bridge
