        "content": "# testeranto-example-project\n\nThis demonstrates how to use all 6 runtimes against a common class.\n\n## Prerequisites\n\n1. Install the testeranto server as a bun executable globally or locally\n2. Install all required language runtimes:\n   - Node.js (with bun)\n   - Go\n   - Rust (with cargo)\n   - Java (with Gradle)\n   - Ruby (with bundler)\n   - Python (with pip)\n\n## Quick Setup\n\nRun the installation script to install all dependencies from their respective package managers:\n\n```bash\nchmod +x install-dependencies.sh\n./install-dependencies.sh\n```\n\n## Manual Setup\n\nIf you prefer to install dependencies manually:\n\n1. Install dependencies for each language:\n\n   ```bash\n   # JavaScript/TypeScript\n   bun install\n\n   # Go\n   go mod download\n\n   # Rust\n   cargo build\n\n   # Java (Kafe)\n   ./gradlew build\n\n   # Ruby\n   bundle install\n\n   # Python\n   pip install -r requirements.txt\n   ```\n\n2. Run tests using the testeranto server:\n\n   ```bash\n   bun run test\n   ```\n\n   Or directly:\n   ```bash\n   testeranto once\n   ```\n\n## Configuration\n\nThe test configuration is in `testeranto/testeranto.ts`. Edit this file to adjust test settings.\n\n## Dependencies\n\nThis project uses the following published packages:\n- JavaScript/TypeScript: testeranto.tiposkripto@0.1.4 (npm)\n- Go: github.com/testeranto-dev/testeranto/src/lib/golingvu@v0.1.10\n- Rust: testeranto_rusto@0.1.4 (crates.io)\n- Java: com.testeranto:testeranto.kafe:0.1.5 (Maven Central)\n- Ruby: testeranto.rubeno@0.1.4 (RubyGems)\n- Python: testeranto.pitono@0.1.4 (PyPI)\n\n## Note on Go Module\n\nThe Go module uses version v0.1.10. For Go modules in subdirectories, tags must include the full path (e.g., `src/lib/golingvu/v0.1.10`). The publish script has been updated to handle this correctly. Make sure to publish the module with the correct tag format before using.\n"

                "content": "# Calculator Example for Kafe (Java)\n\nThis example demonstrates how to use the Dvipa flavored API for Testeranto in Java. It includes a Calculator class and two styles of tests:\n\n1. **Dvipa Annotation-based Tests**: Using `@DvipaTest`, `@Given`, `@When`, `@Then` annotations with JUnit 5\n2. **Fluent Builder Tests**: Using chainable fluent API similar to TypeScript's flavored API\n\n## Structure\n\n- `Calculator.java`: The calculator implementation\n- `CalculatorDvipaTest.java`: Annotation-based BDD tests using Dvipa\n- `CalculatorFluentBuilderTest.java`: Fluent builder style tests\n- `Main.java`: Main entry point to demonstrate the tests\n- `pom.xml`: Maven configuration\n"

                "content": "# Calculator Rust Project\n\nThis is a well-structured Rust project demonstrating best practices for organizing a library with:\n1. A reusable Calculator library\n2. A standalone application binary\n3. Regular Rust tests (unit and integration)\n4. Testeranto BDD tests (separate binary)\n\n## Structure\n\n- `src/` - Library source code\n  - `lib.rs` - Library root with unit tests, re-exports Calculator\n  - `calculator.rs` - Calculator implementation\n  - `bin/` - Binary executables\n    - `main.rs` - Main application binary\n- `tests/` - Integration tests\n  - `integration_test.rs` - Regular Rust integration tests\n- `testeranto/` - Testeranto BDD tests\n  - `Calculator.rusto.test.rs` - Testeranto test binary (compiled separately)\n- `Cargo.toml` - Project configuration\n\n## Building and Testing\n\n### Build the library:\n```bash\ncargo build\n```\n\n### Run the main application:\n```bash\ncargo run --bin calculator_app\n```\n\n### Run regular Rust tests (unit and integration):\n```bash\ncargo test\n```\n\n### Run only integration tests:\n```bash\ncargo test --test integration_test\n```\n\n### Build Testeranto test binary:\n```bash\ncargo build --bin calculator_testeranto_test\n```\n\n### Run Testeranto tests (via Testeranto framework):\n```bash\n# This would be run through the Testeranto test runner, not directly\n```\n\n## Library Usage\n\nAdd to your `Cargo.toml`:\n```toml\n[dependencies]\ncalculator = { path = \"./path/to/calculator\" }\n```\n\nUse in your code:\n```rust\nuse calculator::Calculator;\n\nfn main() {\n    let mut calc = Calculator::new();\n    calc.press(\"1\").press(\"2\").press(\"3\");\n    println!(\"Display: {}\", calc.get_display());\n}\n```\n\n## Best Practices Followed\n\n1. **Clear separation of concerns**: Library, application, and tests are separate\n2. **Proper testing structure**: Unit tests in `src/`, integration tests in `tests/`\n3. **Testeranto tests are separate**: Testeranto BDD tests are compiled as a separate binary\n   and don't interfere with regular Rust tests\n4. **Clean dependencies**: Testeranto dependencies are conditionally included only for the\n   Testeranto binary target\n5. **Documentation**: Clear comments and README explaining the structure\n\n## Key Distinctions\n\n- **Regular Rust tests**: Run with `cargo test`, use Rust's built-in testing framework\n- **Testeranto tests**: BDD-style tests compiled as a separate binary, run through the\n  Testeranto test runner framework for cross-language testing consistency\n"

<body>
  <div id="root">
    <div class="loading">
      <h2>Loading Testeranto Stakeholder Report...</h2>
    </div>
  </div>

  <script type="module">
    document.addEventListener('DOMContentLoaded', async function () {
      const root = document.getElementById('root');
      
      try {
        // Import the bundled React app
        const { renderApp } = await import('./index.js');
        
        // Load data using embedded config
        const stakeholderData = await loadDataWithEmbeddedConfig();
        
        // Render the React app
        renderApp(root, stakeholderData);
      } catch (error) {
        console.error('Failed to load stakeholder report:', error);
        root.innerHTML = `
          <div style="padding: 40px; text-align: center;">
            <h1 style="color: #d32f2f;">Error Loading Report</h1>
            <p>${error.message}</p>
            <p>Please make sure the Testeranto server has generated the report files.</p>
            <details style="text-align: left; max-width: 800px; margin: 20px auto;">
              <summary>Technical Details</summary>
              <pre style="background: #f5f5f5; padding: 10px; overflow: auto;">${error.stack}</pre>
            </details>
          </div>
        `;
      }
    });

    async function loadDataWithEmbeddedConfig() {
      // Get the embedded config and documentation files from the HTML
      const configElement = document.getElementById('testeranto-config');
      if (!configElement) {
        throw new Error('No embedded configuration found in HTML');
      }
      
      let embeddedData;
      try {
        embeddedData = JSON.parse(configElement.textContent);
      } catch (error) {
        throw new Error(`Failed to parse embedded data: ${error.message}`);
      }
      
      const { configs, documentationFiles, featureTree } = embeddedData;
      console.log('Loaded embedded config:', configs);
      console.log('Loaded embedded documentation files:', documentationFiles);
      console.log('Loaded embedded feature tree:', featureTree);
      
      // Now use the config to load all test results
      // Documentation files are already embedded, so we don't need to fetch them
      const testResultsData = await loadTestResults(configs);
      
      return {
        documentation: {
          files: documentationFiles || [],
          timestamp: Date.now()
        },
        testResults: testResultsData.testResults,
        errors: testResultsData.errors || [],
        configs: configs,
        timestamp: new Date().toISOString(),
        workspaceRoot: window.location.origin,
        featureTree: featureTree
      };
    }


    async function loadTestResults(configs) {
      const testResults = {};
      const errors = [];
      
      if (!configs.runtimes) {
        console.log('No runtimes in config');
        return { testResults, errors };
      }
      
      // For each runtime and test, try to fetch the test results
      const promises = [];
      
      for (const [configKey, runtimeConfig] of Object.entries(configs.runtimes)) {
        const runtime = runtimeConfig.runtime;
        const tests = runtimeConfig.tests || [];
        
        console.log(`Loading tests for ${configKey} (${runtime}): ${tests.length} tests`);
        
        for (const testName of tests) {
          // Try multiple possible paths for test results
          // The correct path structure is: testeranto/reports/{configKey}/{testName}/tests.json
          // Also try with sanitized test name
          
          const sanitizedTestName = testName.replace(/\//g, '_').replace(/\./g, '-');
          const possiblePaths = [
            // Primary correct path: HTML is at testeranto/reports/index.html
            // So test results are at ./{configKey}/{testName}/tests.json
            `./${configKey}/${testName}/tests.json`,
            // Alternative with sanitized test name
            `./${configKey}/${sanitizedTestName}/tests.json`,
            // From project root (go up one level then into testeranto/reports)
            `../testeranto/reports/${configKey}/${testName}/tests.json`,
            `../testeranto/reports/${configKey}/${sanitizedTestName}/tests.json`,
            // Using runtime instead of configKey (for backward compatibility)
            `./${runtime}/${testName}/tests.json`,
            `./${runtime}/${sanitizedTestName}/tests.json`,
            `../testeranto/reports/${runtime}/${testName}/tests.json`,
            `../testeranto/reports/${runtime}/${sanitizedTestName}/tests.json`,
            // Absolute-like paths (may work on GitHub Pages)
            `/testeranto/reports/${configKey}/${testName}/tests.json`,
            `/testeranto/reports/${configKey}/${sanitizedTestName}/tests.json`,
            `/testeranto/reports/${runtime}/${testName}/tests.json`,
            `/testeranto/reports/${runtime}/${sanitizedTestName}/tests.json`,
          ];
          
          promises.push(
            fetchTestResultWithMultiplePaths(possiblePaths, configKey, testName, testResults, errors)
          );
        }
      }
      
      // Wait for all promises to settle (both fulfilled and rejected)
      await Promise.allSettled(promises);
      
      console.log(`Loaded ${Object.keys(testResults).length} test results, encountered ${errors.length} errors`);
      
      // Return both test results and errors
      return { testResults, errors };
    }

    async function fetchTestResultWithMultiplePaths(paths, configKey, testName, testResults, errors) {
      const key = `${configKey}/${testName}`;
      let lastError = null;
      
      for (const path of paths) {
        try {
          const response = await fetch(path);
          if (response.ok) {
            const data = await response.json();
            testResults[key] = {
              ...data,
              _sourcePath: path
            };
            console.log(`Loaded test results from: ${path}`);
            return; // Success, stop trying other paths
          } else {
            // Store the HTTP error
            lastError = {
              type: 'http',
              status: response.status,
              statusText: response.statusText,
              path: path,
              configKey,
              testName
            };
            console.warn(`HTTP ${response.status} for ${path}`);
          }
        } catch (error) {
          // Store network or other errors
          lastError = {
            type: 'network',
            error: error.message,
            path: path,
            configKey,
            testName
          };
          console.warn(`Network error for ${path}: ${error.message}`);
          // Continue to next path
        }
      }
      
      // If we get here, all paths failed
      const errorMessage = `Could not find test results for ${configKey}/${testName}`;
      console.warn(errorMessage);
      
      // Add to errors array
      errors.push({
        configKey,
        testName,
        message: errorMessage,
        lastAttempt: lastError,
        triedPaths: paths
      });
      
      // Still add an entry to testResults to indicate missing data
      testResults[key] = {
        _error: true,
        _message: errorMessage,
        _lastAttempt: lastError,
        _triedPaths: paths
      };
    }
  </script>
