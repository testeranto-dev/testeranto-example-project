plugins {
    id 'java'
}

group 'com.yourprojectname'
version '1.0-SNAPSHOT'

repositories {
    mavenCentral()
    maven {
        url = uri("https://repo.maven.apache.org/maven2")
    }
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
    implementation 'com.testeranto:testeranto.kafe:0.1.8'
}

test {
    useJUnitPlatform()
}
